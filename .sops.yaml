creation_rules:
  - path_regex: "secrets/secrets\\.sops\\.yaml$"
    key_groups:
      - age: [*john, *lab, *en-t65-1, *da-vcx-1, *da-vcx-2]

  - path_regex: "modules/.*\\.sops\\.yaml$"
