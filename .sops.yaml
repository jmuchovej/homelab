  - path_regex: "secrets/da\\.sops\\.yaml$"
    key_groups:
      - age: [*john, *lab, *da-n1x, *da-vcx-1, *da-vcx-2, *da-vcx-3, *da-gr75]
  - path_regex: "[^/]+/da-n1x/?[^/]+\\.sops\\.(yaml|json|env|ini)$"
    key_groups:
      - age: [*john, *da-n1x]
  - path_regex: "[^/]+/da-vcx-1/?[^/]+\\.sops\\.(yaml|json|env|ini)$"
