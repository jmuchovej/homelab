      - age: [*john, *lab, *en-t65-1]
  - path_regex: systems/x86_64-install-iso/minimal/[^/]+\.sops\.(yaml|json|env|ini)$
    key_groups:
      - age: [*john, *lab]
  - path_regex: "secrets/users/john\\.sops\\.(yaml|json|env|ini)$"
    key_groups:
      - age: [*john]
  - path_regex: "secrets/users/lab\\.sops\\.(yaml|json|env|ini)$"
