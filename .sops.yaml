  - path_regex: "[^/]+/da-n1x/?[^/]+\\.sops\\.(yaml|json|env|ini)$"
    key_groups:
      - age: [*john]

  - path_regex: "[^/]+/da-vcx-1/?[^/]+\\.sops\\.(yaml|json|env|ini)$"
    key_groups:
      - age: [*john, *lab, *da-vcx-1]

  - path_regex: "[^/]+/da-vcx-2/?[^/]+\\.sops\\.(yaml|json|env|ini)$"
    key_groups:
      - age: [*john, *lab, *da-vcx-2]

  - path_regex: "[^/]+/da-vcx-3/?[^/]+\\.sops\\.(yaml|json|env|ini)$"
    key_groups:
      - age: [*john, *lab, *da-vcx-3]

  - path_regex: "secrets/en\\.sops\\.yaml$"
    key_groups:
      - age: [*john, *lab, *en-t65-1]

  - path_regex: "[^/]+/en-t65-1/[^/]+\\.sops\\.(yaml|json|env|ini)$"
    key_groups:
      - age: [*john, *lab, *en-t65-1]

  - path_regex: systems/x86_64-install-iso/minimal/[^/]+\.sops\.(yaml|json|env|ini)$
    key_groups:
      - age: [*john, *lab, *install-iso]

  - path_regex: "secrets/homes/john\\.sops\\.(yaml|json|env|ini)$"
    key_groups:
      - age: [*john]

  - path_regex: "secrets/homes/lab\\.sops\\.(yaml|json|env|ini)$"
    key_groups:
      - age: [*john, *lab]

stores:
  yaml:
    indent: 2
