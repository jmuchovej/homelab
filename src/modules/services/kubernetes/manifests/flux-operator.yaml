# Flux operator — k3s HelmChart CR (OCI). Reconciles the FluxInstance CR
# (flux-instance.yaml), which installs the Flux controllers and points GitOps
# at the repo. Pulled at runtime by k3s' helm-controller.
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: flux-operator
  namespace: kube-system
spec:
  chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
  version: 0.52.0
  targetNamespace: flux-system
  createNamespace: true
