version: 1
metadata:
  name: tofu service account
  labels:
    blueprints.goauthentik.io/description: |
      OpenTofu/Terraform service account and a fixed-key API token sourced from
      sops. Authenticates tofu without akadmin. (Superuser pending least-priv roles.)
context:
  username: tofu
  group_name: tofu-admins
  token: !Env [AUTHENTIK_TERRAFORM_TOKEN, null]
entries:
  - model: authentik_core.group
    id: tofu-group
    identifiers:
      name: !Context group_name
    attrs:
      is_superuser: true

  - model: authentik_core.user
    id: tofu-user
    identifiers:
      username: !Context username
    attrs:
      name: OpenTofu Service Account
      type: service_account
      path: goauthentik.io/service-accounts
      groups:
        - !KeyOf tofu-group

  - model: authentik_core.token
    conditions:
      - !If [!Context token]
    identifiers:
      identifier: tofu-token
      intent: api
      expiring: false
      user: !KeyOf tofu-user
    attrs:
      key: !Context token
