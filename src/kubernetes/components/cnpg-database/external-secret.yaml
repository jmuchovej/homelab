---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-db-creds"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "${APP}"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: Postgres
        property: password
---
# tofu's credential (DatabaseRole) — username must equal the role name.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tofu-db-creds
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    template:
      type: kubernetes.io/basic-auth
      data:
        username: tofu
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: Postgres
        property: tofu-password
