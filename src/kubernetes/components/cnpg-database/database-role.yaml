---
apiVersion: postgresql.cnpg.io/v1
kind: DatabaseRole
metadata:
  name: ${APP}-db-tofu
spec:
  cluster:
    name: ${APP}-db
  name: tofu
  comment: "OpenTofu — reads + object management"
  login: true
  superuser: false
  createdb: false
  databaseRoleReclaimPolicy: delete
  inRoles:
    - ${APP}
    - pg_read_all_data
  passwordSecret:
    name: tofu-db-creds
