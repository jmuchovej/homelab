---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: *name
  interval: 1h
  values:
    controllers:
      open-webui:
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: 0.10.2
            env:
              TZ: America/New_York
              WEBUI_URL: https://chat.${DC_DOMAIN}
              OLLAMA_BASE_URL: http://ollama.local-ai.svc.cluster.local:11434
              ENABLE_OAUTH_SIGNUP: "true"
              OAUTH_PROVIDER_NAME: authentik
              OAUTH_SCOPES: openid email profile
              # authentik application slug is <slug>-<type> (see app module)
              OPENID_PROVIDER_URL: https://id.${DC_DOMAIN}/application/o/open-webui-oauth/.well-known/openid-configuration
            envFrom:
              - secretRef:
                  name: open-webui-secret
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 2Gi

    service:
      app:
        ports:
          http:
            port: 8080

    route:
      app:
        labels:
          authentik.rbn/enabled: "true"
        annotations:
          authentik.rbn/name: Open WebUI
          authentik.rbn/type: oauth
          authentik.rbn/group: Compute
          authentik.rbn/icon: di:open-webui
          authentik.rbn/access: compute,compute-managers
          authentik.rbn/redirect-uris: https://chat.${DC_DOMAIN}/oauth/oidc/callback
        hostnames:
          - chat.${DC_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: network

    persistence:
      data:
        existingClaim: open-webui-data
        globalMounts:
          - path: /app/backend/data
