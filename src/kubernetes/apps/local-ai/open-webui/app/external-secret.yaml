---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-connect-ro
  target:
    name: open-webui-secret
  data:
    - secretKey: OAUTH_CLIENT_ID
      remoteRef:
        key: Authentik OAuth
        property: open-webui-client-id
    - secretKey: OAUTH_CLIENT_SECRET
      remoteRef:
        key: Authentik OAuth
        property: open-webui-client-secret
