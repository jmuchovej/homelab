---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ollama
spec:
  dependsOn:
    - name: envoy-config
      namespace: network
    - name: authentik
      namespace: auth
  interval: 1h
  path: ./src/kubernetes/apps/local-ai/ollama/app
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-settings
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: local-ai
  wait: true
