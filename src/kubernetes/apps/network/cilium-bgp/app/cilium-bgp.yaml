---
# $schema: https://k8s-schemas.home-operations.com/cilium.io/ciliumloadbalancerippool_v2.json
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: lab
spec:
  allowFirstLastIPs: "No"
  blocks:
    - cidr: 10.69.1.0/24
---
# $schema: https://k8s-schemas.home-operations.com/cilium.io/ciliumbgpadvertisement_v2.json
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: lab-loadbalancer
  labels:
    advertise: bgp
  annotations:
    # bump to force the agent to re-reconcile advertisements — recovers the
    # established-but-advertising-nothing state after a startup RBAC race
    rebellion.dev/kick: "1"
spec:
  advertisements:
    - advertisementType: Service
      service:
        addresses:
          - LoadBalancerIP
      selector:
        matchExpressions:
          - { key: somekey, operator: NotIn, values: ["never-used-value"] }
---
# $schema: https://k8s-schemas.home-operations.com/cilium.io/ciliumbgppeerconfig_v2.json
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: mikrotik
spec:
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: bgp
---
# $schema: https://k8s-schemas.home-operations.com/cilium.io/ciliumbgpclusterconfig_v2.json
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: lab
  annotations:
    rebellion.dev/kick: "1"
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
    - name: cilium
      localASN: 64512
      peers:
        - name: mikrotik
          peerASN: 64512
          peerAddress: 10.69.0.1
          peerConfigRef:
            name: mikrotik
