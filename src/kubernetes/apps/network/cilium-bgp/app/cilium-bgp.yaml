---
# LoadBalancer IP pool — carved from the lab VLAN (10.69.0.0/16). These IPs are
# advertised to MikroTik via BGP as /32s. allowFirstLastIPs "No" reserves .0/.255.
# NOTE: 10.69.1.0/24 must be excluded from the lab DHCP range (topology.yaml /
# MikroTik) before any LoadBalancer Service claims an IP here, to avoid clashes.
# Ingress (Envoy) will pin 10.69.1.1 via `lbipam.cilium.io/ips`.
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: lab
spec:
  allowFirstLastIPs: "No"
  blocks:
    - cidr: 10.69.1.0/24
---
# Advertise LoadBalancer service IPs over BGP. Matched to the peer config by the
# `advertise: bgp` label.
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: lab-loadbalancer
  labels:
    advertise: bgp
spec:
  advertisements:
    - advertisementType: Service
      service:
        addresses:
          - LoadBalancerIP
      selector:
        matchExpressions:
          - { key: somekey, operator: NotIn, values: ["never-used-value"] }
---
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: mikrotik
spec:
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: bgp
---
# Peer with the lab router (da-relay01) — iBGP, both ends AS 64512 (matches the
# existing RouterOS BGP template). peerAddress is the lab gateway 10.69.0.1; the
# MikroTik side (src/terraform/modules/mikrotik/bgp.tofu) peers back at the node.
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: lab
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
    - name: cilium
      localASN: 64512
      peers:
        - name: mikrotik
          peerASN: 64512
          peerAddress: 10.69.0.1
          peerConfigRef:
            name: mikrotik
