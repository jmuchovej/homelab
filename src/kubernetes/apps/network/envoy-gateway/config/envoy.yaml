---
# Data-plane config for the gateway. Single replica (one node); image pinned to
# the version matched to gateway-helm 1.8.1, via the gcr mirror.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy
  namespace: network
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 1
        container:
          image: mirror.gcr.io/envoyproxy/envoy:v1.38.2
      envoyService:
        externalTrafficPolicy: Local
---
# GatewayClass is cluster-scoped (no namespace).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: envoy
    namespace: network
---
# Single external gateway on the VIP. The router's split-horizon DNS
# (the per-DC wildcard) and the WAN 443/80 + hairpin DNATs all target 10.69.1.1
# (catalog.vip), so claiming it makes Envoy THE ingress with zero router-side
# changes. Do not apply while keepalived still holds this address — the LAN
# would see it twice (ARP vs BGP /32).
# Future: add an `envoy-internal` gateway for LAN-only services.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-external
  namespace: network
spec:
  gatewayClassName: envoy
  infrastructure:
    annotations:
      lbipam.cilium.io/ips: 10.69.1.1
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: wildcard-tls
---
# Internal (LAN-only) gateway. Same wildcard cert; isolation comes from the
# network, not TLS: the WAN 443/80 DNATs only target 10.69.1.1, so .1.2 is
# unreachable from the internet by construction. Apps choose exposure via their
# route parentRef: envoy-external vs envoy-internal.
# DNS caveat: internal-only hostnames have no public record and the router's
# split-horizon wildcard (when re-enabled) points at .1.1 — each internal name
# needs its own router DNS record → 10.69.1.2 until an internal-DNS story
# (external-dns webhook or tofu records) lands.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-internal
  namespace: network
spec:
  gatewayClassName: envoy
  infrastructure:
    annotations:
      lbipam.cilium.io/ips: 10.69.1.2
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: wildcard-tls
---
# Redirect plain HTTP → HTTPS on both gateways.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: https-redirect
  namespace: network
  annotations:
    external-dns.alpha.kubernetes.io/controller: none
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: http
    - name: envoy-internal
      namespace: network
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
