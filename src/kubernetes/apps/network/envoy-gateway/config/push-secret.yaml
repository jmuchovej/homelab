---
# Exports the LE wildcard cert INTO 1Password (item `wildcard-tls`, vault
# Homelab) on every cert-manager renewal — external consumers (NixOS hosts,
# …) pull a real, current cert instead of self-signing. Fields are base64
# (1P fields are single-line strings). REQUIRES the Connect token to have
# WRITE access to the vault.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: wildcard-tls
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: onepassword-connect
      kind: ClusterSecretStore
  selector:
    secret:
      name: wildcard-tls
  template:
    data:
      tls.crt: '{{ index . "tls.crt" | b64enc }}'
      tls.key: '{{ index . "tls.key" | b64enc }}'
  data:
    - match:
        secretKey: &crt tls.crt
        remoteRef:
          remoteKey: wildcard-tls
          property: *crt
    - match:
        secretKey: &key tls.key
        remoteRef:
          remoteKey: wildcard-tls
          property: *key
