---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-config
spec:
  dependsOn:
    - name: envoy-gateway
  interval: 1h
  path: ./src/kubernetes/apps/network/envoy-gateway/config
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-settings
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
