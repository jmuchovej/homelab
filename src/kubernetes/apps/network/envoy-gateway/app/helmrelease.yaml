---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
# Installs the Envoy Gateway controller + the Gateway API CRDs. The Gateway/
# GatewayClass/EnvoyProxy config lives in a separate Kustomization
# (envoy-config) that dependsOn this, so it doesn't race the CRDs.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  interval: 1h
  values:
    # Pull through gcr's Docker Hub mirror to dodge anonymous rate limits.
    global:
      imageRegistry: mirror.gcr.io
    config:
      envoyGateway:
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              type: GatewayNamespace
