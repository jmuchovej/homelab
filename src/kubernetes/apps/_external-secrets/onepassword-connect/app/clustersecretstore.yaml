---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword-connect
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.external-secrets.svc.cluster.local
      vaults:
        # Vault "Homelab" (UUID duspj4cybpwrnsfbnuhabyqbdy). The number is the
        # lookup priority (lower wins on title collisions).
        Homelab: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            # Seeded out-of-band from sops by the NixOS k3s aspect.
            name: onepassword-connect-token
            namespace: external-secrets
            key: token
