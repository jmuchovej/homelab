---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: op-connect-ro
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.external-secrets.svc.cluster.local
      vaults:
        Homelab: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: op-connect-ro
            namespace: external-secrets
            key: token
---
# Write-scoped twin, used ONLY by PushSecrets (cert export) — keeps the
# read path least-privilege. Token seeded from sops by the NixOS k3s aspect.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: op-connect-rw
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.external-secrets.svc.cluster.local
      vaults:
        Homelab: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: op-connect-rw
            namespace: external-secrets
            key: token
