---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homebox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-connect-ro
  target:
    name: homebox-secret
  data:
    - secretKey: HBOX_OIDC_CLIENT_ID
      remoteRef:
        key: Authentik OAuth
        property: homebox-client-id
    - secretKey: HBOX_OIDC_CLIENT_SECRET
      remoteRef:
        key: Authentik OAuth
        property: homebox-client-secret
    - secretKey: HBOX_MAILER_PASSWORD
      remoteRef:
        key: Mailgun
        property: smtp-token
    # 0.26+ hard-requires a ≥32-byte pepper HMAC'd into stored API-key
    # hashes; must stay STABLE (rotation invalidates every issued API key)
    - secretKey: HBOX_AUTH_API_KEY_PEPPER
      remoteRef:
        key: Homebox
        property: api-key-pepper
