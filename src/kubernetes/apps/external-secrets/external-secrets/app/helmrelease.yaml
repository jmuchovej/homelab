---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  chartRef:
    kind: OCIRepository
    name: external-secrets
  interval: 1h
  values:
    # ESO ships its own CRDs (ClusterSecretStore, ExternalSecret, ...).
    installCRDs: true
    # Single node — no anti-affinity headroom for extra replicas, and no
    # Prometheus/Grafana operator, so the o11y toggles stay off.
    replicaCount: 1
    webhook:
      replicaCount: 1
    certController:
      replicaCount: 1
