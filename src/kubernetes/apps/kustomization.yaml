---
# Aggregates the per-namespace trees. Explicit (no reliance on Flux
# auto-generating a kustomization from a recursive directory scan).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # `_`-prefix = excluded from cluster-settings seeding (see kubernetes.nix);
  # the k8s namespace is still plain `external-secrets`.
  - ./_external-secrets
  - ./auth
  - ./cert-manager
  - ./databases
  - ./kube-system
  - ./media
  - ./network
