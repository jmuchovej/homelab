---
# Let's Encrypt issuers, DNS-01 via Cloudflare. One solver on the root zone
# covers every subdomain (per-DC/holonet/*) since the _acme-challenge TXT is
# always written to the root zone. Wildcards require DNS-01 — which this is.
# The Cloudflare token comes from the `cloudflare` ExternalSecret; the zone
# and email substitute from `cluster-settings` (issuers.ks.yaml postBuild).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: homelab@${DOMAIN}
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-secret
              key: CLOUDFLARE_DNS_TOKEN
        selector:
          dnsZones:
            - ${DOMAIN}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    email: homelab@${DOMAIN}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-secret
              key: CLOUDFLARE_DNS_TOKEN
        selector:
          dnsZones:
            - ${DOMAIN}
