---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  chartRef:
    kind: OCIRepository
    name: cert-manager
  interval: 1h
  values:
    crds:
      enabled: true
    # Self-check DNS-01 challenge propagation against Cloudflare's public
    # resolver directly — NOT the cluster/split-horizon DNS, which won't see
    # the public `_acme-challenge` TXT records.
    dns01RecursiveNameservers: https://1.1.1.1:443/dns-query,https://1.0.0.1:443/dns-query
    dns01RecursiveNameserversOnly: true
    # Single node — no o11y operator, no anti-affinity headroom.
    replicaCount: 1
    webhook:
      replicaCount: 1
    cainjector:
      replicaCount: 1
