---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# Cloudflare API token for the DNS-01 solver, pulled from 1Password (item
# `adg2r4gvrfjgm7pb3m4j53bcfy`, vault Homelab) into a Secret in this namespace.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cloudflare-secret
    template:
      data:
        CLOUDFLARE_DNS_TOKEN: "{{ .CLOUDFLARE_DNS_TOKEN }}"
  dataFrom:
    - extract:
        key: adg2r4gvrfjgm7pb3m4j53bcfy
