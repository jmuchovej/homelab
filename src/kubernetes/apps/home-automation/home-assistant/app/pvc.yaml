---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-config
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-venv
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zfs
  resources:
    requests:
      storage: 5Gi
