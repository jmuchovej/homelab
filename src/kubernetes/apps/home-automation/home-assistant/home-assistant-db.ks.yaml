---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hass-db
spec:
  dependsOn:
    - name: cloudnative-pg
      namespace: databases
    - name: onepassword-connect
      namespace: external-secrets
  interval: 1h
  path: ./src/kubernetes/components/cnpg-database
  components:
    # one-off NixOS import — inert after first bootstrap; remove alongside
    # future backup wiring, not before (see components/cnpg-import/AGENTS.md)
    - ../cnpg-import
  postBuild:
    substitute:
      # `hass`, not `home-assistant`: the app/db/role names must match the
      # NixOS source database being imported (ensureDatabases = [ "hass" ])
      APP: hass
      DB_SIZE: 10Gi
      HOST: 10.69.11.1
      # convention: DB LBs live at 10.69.1.5x
      DB_LB_IP: 10.69.1.52
    substituteFrom:
      - kind: Secret
        name: cluster-settings
  targetNamespace: home-automation
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
