---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: hubitat
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: hubitat
  extAuth:
    http:
      backendRefs:
        - name: authentik-server
          namespace: auth
          port: 80
      path: /outpost.goauthentik.io/auth/envoy
      headersToBackend:
        - set-cookie
