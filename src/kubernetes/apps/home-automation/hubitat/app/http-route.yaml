---
# Auth-flow route: deliberately NOT targeted by the SecurityPolicy, so login
# and callback requests can never be gated by the auth they implement.
# Longest-path-match precedence sends /outpost.goauthentik.io/* here.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubitat-outpost
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
  hostnames:
    - hubitat.${DC_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io
      backendRefs:
        - name: ak-outpost-proxy
          namespace: auth
          port: 9000
    # Maker API bypasses ext-auth at the ROUTE layer (token-authenticated
    # anyway). authentik's skip_paths can't do it: the ext-auth check appends
    # the original path, and the outpost's Go router 301s any path with
    # encoded slashes (postURL/http%3A%2F%2F…) before the skip-regex runs.
    - matches:
        - path:
            type: PathPrefix
            value: /apps/api
      backendRefs:
        - name: hubitat
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubitat
  labels:
    authentik.rbn/enabled: "true"
  annotations:
    authentik.rbn/name: Hubitat
    authentik.rbn/group: Home
    authentik.rbn/icon: di:hubitat
    authentik.rbn/access: home
    authentik.rbn/skip-paths: /apps/api/*
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
  hostnames:
    - hubitat.${DC_DOMAIN}
  rules:
    - backendRefs:
        - name: hubitat
          port: 80
