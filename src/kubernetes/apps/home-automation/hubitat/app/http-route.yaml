---
# Auth-flow route: deliberately NOT targeted by the SecurityPolicy, so login
# and callback requests can never be gated by the auth they implement.
# Longest-path-match precedence sends /outpost.goauthentik.io/* here.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubitat-outpost
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
  hostnames:
    - hubitat.${DC_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io
      backendRefs:
        - name: authentik-server
          namespace: auth
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubitat
  labels:
    authentik.rbn/enabled: "true"
  annotations:
    authentik.rbn/name: Hubitat
    authentik.rbn/group: Home
    authentik.rbn/icon: di:hubitat
    authentik.rbn/access: home
    authentik.rbn/skip-paths: /apps/api/*
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
  hostnames:
    - hubitat.${DC_DOMAIN}
  rules:
    - backendRefs:
        - name: hubitat
          port: 80
