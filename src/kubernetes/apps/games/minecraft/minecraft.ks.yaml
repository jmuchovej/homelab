---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: minecraft
spec:
  interval: 1h
  path: ./src/kubernetes/apps/games/minecraft/app
  # deliberately NO postBuild/substituteFrom: nothing here needs
  # cluster-settings, which spares the games namespace from the
  # NixOS-seeded secret walk entirely (TCP service, no hostnames)
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: games
  wait: true
