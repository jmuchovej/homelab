# $schema: https://goauthentik.io/blueprints/schema.json
# Provisions the OpenTofu service account declaratively, so tofu can authenticate
# without ever using the akadmin break-glass superuser — and so the credential is
# reconstructed automatically after a DB wipe.
#
# The token key is pinned via AUTHENTIK_TOFU_TOKEN (1Password
# `Authentik/terraform-token`, grafted through the HelmRelease as
# `authentik.terraform_token`). tofu reads the same value as `authentik.token`.
#
# TODO(least-privilege): replace `is_superuser: true` with scoped roles bound to
# tofu-group. Design (validated):
#   - read  : one !Enumerate over `goauthentik.io/rbac/models` → `<app>.view_<model>`
#             (view is the only verb universal across the RBAC model set).
#   - create/update/delete: CANNOT be blanket-enumerated — many SerializerModels are
#             view-only (restricted `default_permissions`), so `add_/change_/delete_`
#             generate non-existent codenames and fail validation. Must be EXPLICIT
#             lists scoped to the models tofu manages, omitting `delete_user`.
#   - meta  : authentik_rbac.{view_system_settings,edit_system_settings,view_system_info}
#   - roles managed by blueprint (not tofu), so no `assign_role_permissions` needed.
# Group binds all roles with `roles: [!KeyOf ...]` and `is_superuser: false`.
version: 1
metadata:
  name: tofu service account
  labels:
    blueprints.goauthentik.io/description: |
      OpenTofu/Terraform service account and a fixed-key API token sourced from
      sops. Authenticates tofu without akadmin. (Superuser pending least-priv roles.)
context:
  username: tofu
  group_name: tofu-admins
  token: !Env [AUTHENTIK_TOFU_TOKEN, null]
entries:
  - model: authentik_core.group
    id: tofu-group
    identifiers:
      name: !Context group_name
    attrs:
      is_superuser: true

  - model: authentik_core.user
    id: tofu-user
    identifiers:
      username: !Context username
    attrs:
      name: OpenTofu Service Account
      type: service_account
      path: goauthentik.io/service-accounts
      groups:
        - !KeyOf tofu-group

  - model: authentik_core.token
    conditions:
      - !If [!Context token]
    identifiers:
      identifier: tofu-token
      intent: api
      expiring: false
      user: !KeyOf tofu-user
    attrs:
      key: !Context token
