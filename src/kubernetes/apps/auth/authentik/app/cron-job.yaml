---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: icon-sync
spec:
  schedule: "0 5 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: sync
              image: mirror.gcr.io/alpine/git:latest
              command:
                - /bin/sh
                - -ec
                - |
                  sync_pack() { # repo dest
                    git clone --depth=1 "https://github.com/$1" /tmp/pack
                    for fmt in png webp svg; do
                      rm -rf "/media/$2/$fmt"
                      mkdir -p "/media/$2"
                      cp -r "/tmp/pack/$fmt" "/media/$2/$fmt"
                    done
                    rm -rf /tmp/pack
                  }
                  sync_pack homarr-labs/dashboard-icons di
                  sync_pack selfhst/icons sh
                  echo "synced: $(find /media/di /media/sh -type f | wc -l) icons"
              volumeMounts:
                - name: media
                  mountPath: /media
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: media
              persistentVolumeClaim:
                claimName: authentik-media
            - name: tmp
              emptyDir: {}
