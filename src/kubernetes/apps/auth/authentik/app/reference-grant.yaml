---
# Cross-namespace access to authentik-server for ext-auth consumers:
# HTTPRoutes (outpost login/callback paths) and SecurityPolicies (extAuth
# backendRefs). Add each consuming namespace to `from` as apps adopt ext-auth.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: authentik-ext-auth
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: home-automation
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: home-automation
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: local-ai
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: local-ai
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: media
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: media
  to:
    - group: ""
      kind: Service
      name: ak-outpost-proxy
