# Deliberately quality DEFINITIONS only: quality profiles are tofu-managed
# (src/terraform/servarr — radarr_quality_profile et al.), and syncing custom
# formats would score into those profiles, leaving the two tools fighting
# over the same objects. Expand scope only alongside a tofu retreat.
radarr:
  radarr:
    base_url: http://radarr.media.svc.cluster.local:7878
    api_key: !env_var RADARR_API_KEY
    quality_definition:
      type: movie

sonarr:
  sonarr:
    base_url: http://sonarr.media.svc.cluster.local:8989
    api_key: !env_var SONARR_API_KEY
    quality_definition:
      type: series
