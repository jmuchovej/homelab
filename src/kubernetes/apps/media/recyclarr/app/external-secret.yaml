---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recyclarr
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-connect-ro
  target:
    name: recyclarr-secret
  data:
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: Servarr
        property: radarr-api-key
    - secretKey: SONARR_API_KEY
      remoteRef:
        key: Servarr
        property: sonarr-api-key
