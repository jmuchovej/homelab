---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./oci-repository.yaml
  - ./external-secret.yaml
  - ./helm-release.yaml

configMapGenerator:
  - name: recyclarr-configuration
    files:
      - ./resources/recyclarr.yml
    options:
      disableNameSuffixHash: true
