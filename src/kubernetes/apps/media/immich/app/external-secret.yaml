---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-connect-ro
  target:
    name: immich-secret
    template:
      data:
        # IMMICH_CONFIG_FILE payload — settings carried over from the NixOS
        # module verbatim. The file replaces admin-UI config wholesale;
        # unlisted keys fall back to immich defaults. The storageTemplate
        # braces are quoted through Go-template so they emerge literal.
        immich-config.json: |
          {
            "machineLearning": {
              "enabled": true,
              "urls": ["http://immich-machine-learning:3003"]
            },
            "oauth": {
              "enabled": true,
              "autoLaunch": true,
              "autoRegister": true,
              "buttonText": "Login with JM Cloud",
              "clientId": "{{ .client_id }}",
              "clientSecret": "{{ .client_secret }}",
              "issuerUrl": "https://id.${DC_DOMAIN}/application/o/immich-oauth/.well-known/openid-configuration",
              "defaultStorageQuota": null,
              "mobileOverrideEnabled": false,
              "mobileRedirectUri": "",
              "profileSigningAlgorithm": "none",
              "roleClaim": "immich_role",
              "scope": "openid email profile",
              "signingAlgorithm": "RS256",
              "storageLabelClaim": "preferred_username",
              "storageQuotaClaim": "immich_quota",
              "timeout": 30000,
              "tokenEndpointAuthMethod": "client_secret_post"
            },
            "notifications": {
              "smtp": {
                "enabled": true,
                "from": "immich@jm0.io",
                "replyTo": "no-reply@jm0.io",
                "transport": {
                  "host": "smtp.mailgun.org",
                  "port": 587,
                  "ignoreCert": false,
                  "secure": false,
                  "username": "{{ .mailgun_username }}",
                  "password": "{{ .mailgun_token }}"
                }
              }
            },
            "passwordLogin": { "enabled": false },
            "reverseGeocoding": { "enabled": true },
            "server": {
              "externalDomain": "https://photos.${DC_DOMAIN}",
              "loginPageMessage": "",
              "publicUsers": false
            },
            "storageTemplate": {
              "enabled": true,
              "hashVerificationEnabled": true,
              "template": {{ `"{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}"` }}
            },
            "trash": { "enabled": true, "days": 90 },
            "user": { "deleteDelay": 7 }
          }
  data:
    - secretKey: client_id
      remoteRef:
        key: Authentik OAuth
        property: immich-client-id
    - secretKey: client_secret
      remoteRef:
        key: Authentik OAuth
        property: immich-client-secret
    - secretKey: mailgun_username
      remoteRef:
        key: Mailgun
        property: username
    - secretKey: mailgun_token
      remoteRef:
        key: Mailgun
        property: smtp-token
