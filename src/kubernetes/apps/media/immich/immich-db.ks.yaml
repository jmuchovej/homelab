---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich-db
spec:
  dependsOn:
    - name: cloudnative-pg
      namespace: databases
    - name: onepassword-connect
      namespace: external-secrets
  interval: 1h
  path: ./src/kubernetes/components/cnpg-database
  components:
    # one-off NixOS import — inert after first bootstrap; remove alongside
    # future backup wiring, not before (see components/cnpg-import/AGENTS.md)
    - ../cnpg-import
    # VectorChord image + preload — MUST be a component: the cluster-apps
    # parent clobbers per-app ks spec.patches (see the component's header)
    - ../cnpg-vectorchord
  postBuild:
    substitute:
      APP: immich
      DB_SIZE: 10Gi
      HOST: 10.69.11.1
      # convention: DB LBs live at 10.69.1.5x
      DB_LB_IP: 10.69.1.59
    substituteFrom:
      - kind: Secret
        name: cluster-settings
  targetNamespace: media
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
