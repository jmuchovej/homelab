---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name lidarr
spec:
  chartRef:
    kind: OCIRepository
    name: *name
  interval: 1h
  values:
    controllers:
      lidarr:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/lidarr
              tag: 3.1.3.4975@sha256:0233c0a4bed5c2de663498a1d426919709190e5f23cf16ab219f51bfd144719c
            env:
              TZ: America/New_York
              # authentik fronts the UI; the API keeps its X-Api-Key gate
              LIDARR__AUTH__METHOD: External
              LIDARR__AUTH__REQUIRED: Enabled
              # log-to-db is noise — the old <app>-log database stays behind
              LIDARR__LOG__DBENABLED: "False"
              LIDARR__POSTGRES__HOST: lidarr-db-rw
              LIDARR__POSTGRES__PORT: "5432"
              LIDARR__POSTGRES__USER: lidarr
              LIDARR__POSTGRES__PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: lidarr-db-creds
                    key: password
              LIDARR__POSTGRES__MAINDB: lidarr
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &port 8686
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 1Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        # gids owning the NFS media tree (setgid dirs): 193 = library, 911 =
        # Downloads/Books — membership is what makes imports/renames writable
        supplementalGroups: [193, 911]

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      config:
        existingClaim: lidarr-config
        globalMounts:
          - path: /config
      media:
        # mounted at the SAME path the NixOS services used — the imported
        # database references /srv/media/... everywhere
        type: hostPath
        hostPath: /srv/media
        globalMounts:
          - path: /srv/media
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
