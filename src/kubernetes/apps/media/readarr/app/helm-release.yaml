---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name readarr
spec:
  chartRef:
    kind: OCIRepository
    name: *name
  interval: 1h
  values:
    controllers:
      readarr:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/readarr
              tag: 0.4.18.2805@sha256:8f7551205fbdccd526db23a38a6fba18b0f40726e63bb89be0fb2333ff4ee4cd
            env:
              TZ: America/New_York
              # authentik fronts the UI; the API keeps its X-Api-Key gate
              READARR__AUTH__METHOD: External
              READARR__AUTH__REQUIRED: Enabled
              # no LOG__DBENABLED in readarr 0.4.x — it REQUIRES a log db
              # (fresh, declarative; the old one stays behind)
              READARR__POSTGRES__LOGDB: readarr-log
              READARR__POSTGRES__HOST: readarr-db-rw
              READARR__POSTGRES__PORT: "5432"
              READARR__POSTGRES__USER: readarr
              READARR__POSTGRES__PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: readarr-db-creds
                    key: password
              READARR__POSTGRES__MAINDB: readarr
              READARR__POSTGRES__CACHEDB: readarr-cache
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &port 8787
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 1Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        # gids owning the NFS media tree (setgid dirs): 193 = library, 911 =
        # Downloads/Books — membership is what makes imports/renames writable
        supplementalGroups: [193, 911]

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      config:
        existingClaim: readarr-config
        globalMounts:
          - path: /config
      media:
        # mounted at the SAME path the NixOS services used — the imported
        # database references /srv/media/... everywhere
        type: hostPath
        hostPath: /srv/media
        globalMounts:
          - path: /srv/media
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
