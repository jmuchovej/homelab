---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plex
spec:
  dependsOn:
    # the gateway (envoy-external) must exist for the HTTPRoute to attach.
    - name: envoy-config
      namespace: network
  interval: 1h
  path: ./src/kubernetes/apps/media/plex/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-settings
  wait: true
