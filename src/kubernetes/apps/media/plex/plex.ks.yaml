---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plex
spec:
  dependsOn:
    - name: envoy-config
      namespace: network
  interval: 1h
  path: ./src/kubernetes/apps/media/plex/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-settings
  wait: true
