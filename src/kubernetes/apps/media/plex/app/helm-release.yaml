---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  chartRef:
    kind: OCIRepository
    name: plex
  interval: 1h
  values:
    controllers:
      plex:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.3.10828@sha256:0c0b6899339503af17cb190b25af6acf10f0030e2820985e16ee14ef428f49d7
            env:
              TZ: America/New_York
              PLEX_ADVERTISE_URL: https://plex.${DC_DOMAIN}:443,http://10.69.1.32:32400
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: &port 32400
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 16Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.69.1.32
        externalTrafficPolicy: Local
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - plex.${DC_DOMAIN}
          - play.${DC_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - # Ref: https://forums.plex.tv/t/external-srt-subtitles-are-not-working-w-reverse-proxy/886540
            backendRefs:
              - identifier: app
                port: *port
            filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  remove:
                    - Range
            matches:
              - path:
                  type: PathPrefix
                  value: /library/streams
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        existingClaim: plex-config
        globalMounts:
          - path: /config
      media:
        type: hostPath
        hostPath: /srv/media
        globalMounts:
          - path: /media/Movies-1080p
            subPath: Movies-1080p
            readOnly: false
          - path: /media/Movies-2160p
            subPath: Movies-2160p
            readOnly: false
          - path: /media/Series-1080p
            subPath: Series-1080p
            readOnly: false
          - path: /media/Series-2160p
            subPath: Series-2160p
            readOnly: false
      transcode:
        type: emptyDir
        globalMounts:
          - path: /transcode
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
