---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name sonarr
spec:
  chartRef:
    kind: OCIRepository
    name: *name
  interval: 1h
  values:
    controllers:
      sonarr:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/sonarr
              tag: 4.0.18.2978@sha256:2cd77fb3d81909a734d61bb8f71462044cb9d2f187e626a28a05a5c4e4be8fd2
            env:
              TZ: America/New_York
              # authentik fronts the UI; the API keeps its X-Api-Key gate
              SONARR__AUTH__METHOD: External
              SONARR__AUTH__REQUIRED: Enabled
              # log-to-db is noise — the old <app>-log database stays behind
              SONARR__LOG__DBENABLED: "False"
              SONARR__POSTGRES__HOST: sonarr-db-rw
              SONARR__POSTGRES__PORT: "5432"
              SONARR__POSTGRES__USER: sonarr
              SONARR__POSTGRES__PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: sonarr-db-creds
                    key: password
              SONARR__POSTGRES__MAINDB: sonarr
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &port 8989
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        # gids owning the NFS media tree (setgid dirs): 193 = library, 911 =
        # Downloads/Books — membership is what makes imports/renames writable
        supplementalGroups: [193, 911]

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      config:
        existingClaim: sonarr-config
        globalMounts:
          - path: /config
      media:
        # mounted at the SAME path the NixOS services used — the imported
        # database references /srv/media/... everywhere
        type: hostPath
        hostPath: /srv/media
        globalMounts:
          - path: /srv/media
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
