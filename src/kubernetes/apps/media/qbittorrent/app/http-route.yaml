---
# Auth-flow route: deliberately NOT targeted by the SecurityPolicy, so login
# and callback requests can never be gated by the auth they implement.
#
# NO /api bypass here, on purpose (unlike the arrs): qbittorrent's API has no
# per-request token — its auth whitelist covers the pod CIDR, so a route-layer
# bypass would leave the API open to the internet. The arrs reach it
# in-cluster (qbittorrent.media.svc); external access goes through ext-auth.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent-outpost
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
  hostnames:
    - qbittorrent.${DC_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io
      backendRefs:
        - name: ak-outpost-proxy
          namespace: auth
          port: 9000
---
# NOTE: raw routes (not app-template `route:` values) — with a second route
# key the chart names every route `<app>-<key>`, and discovery keys on the
# route NAME, which must stay `qbittorrent` for a zero-diff cutover.
#
# skip-paths is EXPLICITLY EMPTY (frozen entry had /api/*): under envoy
# ext-auth a provider skip would let unauthenticated /api requests straight
# through to the whitelisted backend. It must be "" and not absent — the
# terraform-authentik provider never PATCHes a null field, so absent leaves
# whatever value authentik last had (found the /api/* hole live 2026-07-23;
# cleared via direct API PATCH + this annotation keeps all three in sync).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent
  labels:
    authentik.rbn/enabled: "true"
  annotations:
    authentik.rbn/skip-paths: ""
    authentik.rbn/name: qBittorrent
    authentik.rbn/group: Media Management
    authentik.rbn/icon: di:qbittorrent
    authentik.rbn/access: media-managers
    authentik.rbn/basic-auth.enabled: "true"
    authentik.rbn/basic-auth.username: servarr-username
    authentik.rbn/basic-auth.password: servarr-password
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
  hostnames:
    - qbittorrent.${DC_DOMAIN}
  rules:
    - backendRefs:
        - name: qbittorrent
          port: 8080
