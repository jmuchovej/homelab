---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name radarr
spec:
  chartRef:
    kind: OCIRepository
    name: *name
  interval: 1h
  values:
    controllers:
      radarr:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/radarr
              tag: 6.4.0.10523@sha256:c82ca292d70ac798bc993421fa7467b0c760238db646a1abc7789115d4359d5c
            env:
              TZ: America/New_York
              # authentik fronts the UI; the API keeps its X-Api-Key gate
              RADARR__AUTH__METHOD: External
              RADARR__AUTH__REQUIRED: Enabled
              # log-to-db is noise — the old <app>-log database stays behind
              RADARR__LOG__DBENABLED: "False"
              RADARR__POSTGRES__HOST: radarr-db-rw
              RADARR__POSTGRES__PORT: "5432"
              RADARR__POSTGRES__USER: radarr
              RADARR__POSTGRES__PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: radarr-db-creds
                    key: password
              RADARR__POSTGRES__MAINDB: radarr
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &port 7878
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        # gids owning the NFS media tree (setgid dirs): 193 = library, 911 =
        # Downloads/Books — membership is what makes imports/renames writable
        supplementalGroups: [193, 911]

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      config:
        existingClaim: radarr-config
        globalMounts:
          - path: /config
      media:
        # mounted at the SAME path the NixOS services used — the imported
        # database references /srv/media/... everywhere
        type: hostPath
        hostPath: /srv/media
        globalMounts:
          - path: /srv/media
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
